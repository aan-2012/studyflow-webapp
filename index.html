{% extends "base.html" %}

{% block content %}

<h1>Dashboard</h1>

<div class="card">
    <h3>Overview</h3>
    <p>{{ completed_tasks }} / {{ total_tasks }} tasks completed</p>
    <p>{{ progress }}% progress</p>
</div>

<div class="card">
    <div class="progress-bar">
        <div class="progress-fill" style="width: {{ progress }}%;"></div>
    </div>
</div>

<div class="card">
    <a href="/tasks"><button>Go to Tasks</button></a>
    <a href="/notes"><button>Go to Notes</button></a>
</div>

{% endblock %}
