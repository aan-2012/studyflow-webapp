{% extends "base.html" %}

{% block content %}
<h1>Notes</h1>

<form method="GET">
    <input type="text" name="category" placeholder="Search Category">
    <button type="submit">Filter</button>
</form>

<div class="card">
    <form method="POST">

        <!-- TOOLBAR -->
        <div class="toolbar">
            <button type="button" onclick="document.execCommand('bold')"><b>B</b></button>
            <button type="button" onclick="document.execCommand('italic')"><i>I</i></button>
            <button type="button" onclick="document.execCommand('underline')"><u>U</u></button>

            <button type="button" onclick="document.execCommand('insertUnorderedList')">• List</button>
            <button type="button" onclick="document.execCommand('insertOrderedList')">1. List</button>
        </div>

        <!-- EDITOR -->
        <div id="editor"
            contenteditable="true"
            style="min-height: 200px; padding: 10px; border: 1px solid #ccc; border-radius: 8px;">
        </div>

        <!-- HIDDEN INPUT -->
        <input type="hidden" name="note" id="hiddenNote">

        <p id="charCount">0 / 2000</p>

        <input
            type="text"
            name="category"
            placeholder="e.g. Maths Lesson 1"
            style="width: 100%; padding: 8px; margin-bottom: 10px;">

        <button type="submit">Save Note</button>

    </form>
</div>

<h2>Saved Notes</h2>

{% for note in notes %}
    <div class="card">
        <strong>{{ note[2] if note[2] else "No Category" }}</strong>

        <!-- IMPORTANT: render HTML safely -->
        <div class="note-content">
            {{ note[1] | safe }}
        </div>

        <form action="{{ url_for('delete_note', note_id=note[0]) }}" method="POST">
            <button type="submit">Delete</button>
        </form>
    </div>
{% endfor %}

<script>
const editor = document.getElementById("editor");
const hiddenNote = document.getElementById("hiddenNote");
const charCount = document.getElementById("charCount");

function sync() {
    hiddenNote.value = editor.innerHTML;
    charCount.textContent = editor.innerText.length + " / 2000";
}

editor.addEventListener("input", sync);
sync();
</script>

{% endblock %}
