{% extends "base.html" %}

{% block content %}
<h1>Edit Task</h1>

<div class="card">
    <form method="POST">
        <input type="text" name="task" value="{{ task[1] }}" required>

        <select name="category">
            <option value="School" {% if task[2] == "School" %}selected{% endif %}>School</option>
            <option value="Personal" {% if task[2] == "Personal" %}selected{% endif %}>Personal</option>
            <option value="Extracurricular" {% if task[2] == "Extracurricular" %}selected{% endif %}>Extracurricular</option>
            <option value="Other" {% if task[2] == "Other" %}selected{% endif %}>Other</option>
        </select>

        <button type="submit">Save</button>
    </form>
</div>

{% endblock %}
